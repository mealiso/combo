                } else if (selectedFormat === 'MAIL:PASS') {
                    if (result.email && result.password) {
                        formattedResults.push(`${result.email}:${result.password}`);
                    }
                } else if (selectedFormat === 'URL:PASS') {
                    if (result.url && result.password) {
                        formattedResults.push(`${result.url}:${result.password}`);
                    }
                } else {
                    if (result.username && result.password) {
                        formattedResults.push(`${result.username}:${result.password}`);
                    }
                }
            });
            
            // Sonuçları göster - textarea oluştur
            extractedResultsDiv.innerHTML = '';
            const textarea = document.createElement('textarea');
            textarea.className = 'extracted-results fade-in';
            textarea.value = formattedResults.join('\n');
            extractedResultsDiv.appendChild(textarea);

            // Show action buttons if there are results
            if (successCount > 0) {
                comboActions.style.display = 'block';
                comboActions.classList.add('fade-in');
            } else {
                comboActions.style.display = 'none';
            }
            
            // İstatistikleri güncelle (animated counters)
            animateCounter(document.getElementById('totalLines'), totalLines);
            animateCounter(document.getElementById('extractedCombos'), successCount);

            // Update tab badge
            updateTabBadge('comboTabBadge', successCount);
            
            const successRate = totalLines > 0 ? Math.round((successCount / totalLines) * 100) : 0;
            document.getElementById('successRate').textContent = successRate + '%';
            
            // Durum mesajını güncelle
            const statusElem = document.getElementById('comboStatus');
            statusElem.textContent = `Ayıklama tamamlandı: ${successCount} combo bulundu`;
            
            if (failureCount > 0) {
                statusElem.textContent += ` (${failureCount} satır eşleşmedi)`;
            }
            
            console.log(`Ayıklama tamamlandı. Toplam: ${totalLines}, Başarılı: ${successCount}, Başarısız: ${failureCount}`);
        }

        /* ── Arama sonuçlarını Combo sekmesine aktar ── */
        function transferToCombo() {
            if (!searchResults.length) {
                showToast('Aktarılacak sonuç bulunamadı!', true);
                return;
            }
            const lines = searchResults.map(r => r.line).join('\n');
            document.getElementById('comboInput').value = lines;
            // Combo sekmesine geç
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('combo-tab').classList.add('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
            showToast(`${searchResults.length} satır Combo Ayıklayıcıya aktarıldı ✓`);
        }

        /* ── Ayıklanan comboları aynı sekmedeki input'a geri aktar ── */
        function transferExtractedToCombo() {
            const ta = document.querySelector('#extractedResults textarea');
            if (!ta || !ta.value.trim()) {
                showToast('Aktarılacak sonuç bulunamadı!', true);
                return;
            }
            document.getElementById('comboInput').value = ta.value;
            showToast('Sonuçlar giriş alanına aktarıldı ✓');
        }

        /* ── Toast bildirim ── */
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('error');
            if (isError) {
                t.classList.add('error');
            }
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
